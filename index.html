<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 YouTube Paralelo</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #222222;
      --bg-hover: #2a2a2a;
      --bg-input: #121212;
      --text-primary: #f1f1f1;
      --text-secondary: #aaaaaa;
      --accent: #ff4444;
      --accent-hover: #ff6666;
      --border: #333333;
      --shadow: rgba(0,0,0,0.4);
      --radius: 12px;
      --transition: 0.25s ease;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .logo-text span { color: var(--accent); }

    /* ===== SEARCH ===== */
    .search-container {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }

    .search-input {
      flex: 1;
      padding: 10px 18px;
      font-size: 15px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      outline: none;
      transition: border var(--transition);
    }

    .search-input:focus { border-color: #555; }

    .search-input::placeholder { color: #666; }

    .search-btn {
      padding: 10px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      align-items: center;
    }

    .search-btn:hover { background: var(--bg-hover); }

    /* ===== NAV PILLS ===== */
    .nav-pills {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      overflow-x: auto;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
    }

    .nav-pills::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 8px 16px;
      background: var(--bg-card);
      border: none;
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }

    .pill:hover, .pill.active {
      background: var(--text-primary);
      color: var(--bg-primary);
    }

    /* ===== MAIN LAYOUT ===== */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ===== VIDEO PLAYER SECTION ===== */
    .player-section {
      display: none;
      margin-bottom: 32px;
    }

    .player-section.active { display: block; }

    .player-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .player-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .player-info {
      max-width: 900px;
      margin: 16px auto 0;
    }

    .player-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .player-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .player-meta .channel {
      color: var(--text-primary);
      font-weight: 600;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      margin-bottom: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .back-btn:hover { background: var(--bg-hover); }

    .player-description {
      max-width: 900px;
      margin: 16px auto 0;
      padding: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    /* ===== VIDEO GRID ===== */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
    }

    .video-card:hover {
      transform: translateY(-4px);
      border-color: var(--border);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .thumb-container {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #111;
    }

    .thumb-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .video-card:hover .thumb-container img {
      transform: scale(1.05);
    }

    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card-info {
      padding: 12px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .card-channel {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .card-stats {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 8px;
    }

    /* ===== LOADING ===== */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .loading.active { display: block; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-secondary);
      font-size: 15px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-desc {
      color: var(--text-secondary);
      font-size: 15px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ===== ERROR ===== */
    .error-msg {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--accent);
    }

    .error-msg.active { display: block; }

    /* ===== TRENDING SECTION ===== */
    .trending-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 32px;
      color: #555;
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      header { padding: 10px 14px; gap: 12px; }
      .logo-text { display: none; }
      .search-input { font-size: 14px; padding: 9px 12px; }
      .search-btn { padding: 9px 16px; }
      .nav-pills { padding: 10px 14px; }
      main { padding: 16px; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
      .player-title { font-size: 17px; }
    }

    @media (max-width: 480px) {
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo" onclick="goHome()">
      <div class="logo-icon">▶</div>
      <div class="logo-text">YouTube <span>Paralelo</span></div>
    </div>
    <div class="search-container">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Pesquisar vídeos..."
        autocomplete="off"
      />
      <button class="search-btn" onclick="doSearch()">🔍</button>
    </div>
  </header>

  <!-- NAV PILLS -->
  <nav class="nav-pills" id="navPills">
    <button class="pill active" onclick="quickSearch('Tendências', this)">🔥 Tendências</button>
    <button class="pill" onclick="quickSearch('Música', this)">🎵 Música</button>
    <button class="pill" onclick="quickSearch('Gaming', this)">🎮 Gaming</button>
    <button class="pill" onclick="quickSearch('Notícias', this)">📰 Notícias</button>
    <button class="pill" onclick="quickSearch('Esportes', this)">⚽ Esportes</button>
    <button class="pill" onclick="quickSearch('Tecnologia', this)">💻 Tecnologia</button>
    <button class="pill" onclick="quickSearch('Comédia', this)">😂 Comédia</button>
    <button class="pill" onclick="quickSearch('Educação', this)">📚 Educação</button>
    <button class="pill" onclick="quickSearch('Culinária', this)">🍳 Culinária</button>
    <button class="pill" onclick="quickSearch('Fitness', this)">💪 Fitness</button>
    <button class="pill" onclick="quickSearch('Filmes', this)">🎬 Filmes</button>
    <button class="pill" onclick="quickSearch('Ciência', this)">🔬 Ciência</button>
  </nav>

  <!-- MAIN CONTENT -->
  <main>

    <!-- PLAYER SECTION -->
    <section class="player-section" id="playerSection">
      <button class="back-btn" onclick="closePlayer()">← Voltar aos resultados</button>
      <div class="player-wrapper">
        <iframe
          id="videoPlayer"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <div class="player-info">
        <h1 class="player-title" id="playerTitle"></h1>
        <div class="player-meta">
          <span class="channel" id="playerChannel"></span>
          <span id="playerViews"></span>
          <span id="playerDate"></span>
        </div>
      </div>
      <div class="player-description" id="playerDesc"></div>
    </section>

    <!-- LOADING STATE -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p class="loading-text">Buscando vídeos...</p>
    </div>

    <!-- ERROR STATE -->
    <div class="error-msg" id="errorState">
      <p style="font-size:48px;margin-bottom:12px;">⚠️</p>
      <p style="font-size:18px;font-weight:600;">Erro ao buscar vídeos</p>
      <p style="color:var(--text-secondary);margin-top:8px;" id="errorText"></p>
      <p style="color:var(--text-secondary);margin-top:12px;font-size:13px;">Tentando outro servidor...</p>
    </div>

    <!-- RESULTS SECTION -->
    <section id="resultsSection">
      <div class="section-title" id="sectionTitle">🔥 Tendências</div>
      <div class="video-grid" id="videoGrid"></div>
    </section>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">🎬</div>
      <div class="empty-title">Nenhum vídeo encontrado</div>
      <div class="empty-desc">Tente buscar por outro termo ou escolha uma categoria acima.</div>
    </div>

  </main>

  <footer>
    YouTube Paralelo — Frontend alternativo • Apenas para fins educacionais
  </footer>

  <script>
    // ===== INVIDIOUS INSTANCES (fallback list) =====
    const INSTANCES = [
      'https://vid.puffyan.us',
      'https://invidious.snopyta.org',
      'https://yewtu.be',
      'https://inv.riverside.rocks',
      'https://invidious.kavin.rocks',
      'https://inv.bp.projectsegfau.lt',
      'https://invidious.protokolla.fi',
      'https://invidious.privacydev.net',
      'https://invidious.lunar.icu',
      'https://iv.ggtyler.dev',
    ];

    let currentInstance = 0;
    let currentQuery = '';
    let searchResults = [];

    // ===== DOM ELEMENTS =====
    const searchInput    = document.getElementById('searchInput');
    const videoGrid      = document.getElementById('videoGrid');
    const loadingState   = document.getElementById('loadingState');
    const errorState     = document.getElementById('errorState');
    const errorText      = document.getElementById('errorText');
    const emptyState     = document.getElementById('emptyState');
    const resultsSection = document.getElementById('resultsSection');
    const sectionTitle   = document.getElementById('sectionTitle');
    const playerSection  = document.getElementById('playerSection');
    const videoPlayer    = document.getElementById('videoPlayer');
    const playerTitle    = document.getElementById('playerTitle');
    const playerChannel  = document.getElementById('playerChannel');
    const playerViews    = document.getElementById('playerViews');
    const playerDate     = document.getElementById('playerDate');
    const playerDesc     = document.getElementById('playerDesc');

    // ===== INIT =====
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    window.addEventListener('load', () => fetchVideos('Tendências Brasil'));

    // ===== SEARCH =====
    function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      sectionTitle.textContent = '🔎 Resultados para: ' + q;
      fetchVideos(q);
    }

    function quickSearch(term, el) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      if (el) el.classList.add('active');
      searchInput.value = '';
      sectionTitle.textContent = '🔥 ' + term;
      fetchVideos(term);
    }

    // ===== FETCH FROM INVIDIOUS =====
    async function fetchVideos(query, instanceIdx = 0) {
      currentQuery = query;
      showLoading(true);
      hideError();
      hideEmpty();
      closePlayer();

      // Try each instance in order
      for (let i = instanceIdx; i < INSTANCES.length; i++) {
        const base = INSTANCES[i];
        const url = `${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video&page=1&region=BR`;

        try {
          const resp = await fetchWithTimeout(url, 8000);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();

          if (data && data.length > 0) {
            currentInstance = i;
            searchResults = data.filter(v => v.type === 'video');
            renderVideos(searchResults);
            showLoading(false);
            return;
          }
        } catch (err) {
          console.warn(`Instance ${base} failed:`, err.message);
          continue;
        }
      }

      // All instances failed — try piped API as ultimate fallback
      try {
        const pipedUrl = `https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`;
        const resp = await fetchWithTimeout(pipedUrl, 8000);
        if (resp.ok) {
          const data = await resp.json();
          if (data.items && data.items.length > 0) {
            searchResults = data.items.map(normalizePiped);
            renderVideos(searchResults);
            showLoading(false);
            return;
          }
        }
      } catch(e) {
        console.warn('Piped also failed:', e.message);
      }

      showLoading(false);
      showError('Todos os servidores estão indisponíveis. Tente novamente em alguns minutos.');
    }

    function fetchWithTimeout(url, ms) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
    }

    // Normalize Piped API format to Invidious-like
    function normalizePiped(item) {
      const id = (item.url || '').replace('/watch?v=', '');
      return {
        type: 'video',
        videoId: id,
        title: item.title || 'Sem título',
        author: item.uploaderName || item.uploader || 'Desconhecido',
        authorUrl: item.uploaderUrl || '',
        viewCount: item.views || 0,
        publishedText: item.uploadedDate || '',
        lengthSeconds: item.duration || 0,
        videoThumbnails: [{ quality: 'medium', url: item.thumbnail || '' }],
        description: item.shortDescription || '',
      };
    }

    // ===== RENDER =====
    function renderVideos(videos) {
      if (!videos.length) { hideResults(); showEmpty(); return; }
      showResults();
      videoGrid.innerHTML = videos.map((v, i) => {
        const thumb = getBestThumb(v);
        const duration = formatDuration(v.lengthSeconds);
        const views = formatViews(v.viewCount);
        return `
          <div class="video-card" onclick="playVideo(${i})">
            <div class="thumb-container">
              <img src="${thumb}" alt="${escapeHtml(v.title)}" loading="lazy"
                   onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect fill=%22%23222%22 width=%22320%22 height=%22180%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23555%22 font-size=%2220%22 text-anchor=%22middle%22 dy=%22.3em%22>▶</text></svg>'" />
              ${duration ? `<span class="duration-badge">${duration}</span>` : ''}
            </div>
            <div class="card-info">
              <div class="card-title">${escapeHtml(v.title)}</div>
              <div class="card-channel">${escapeHtml(v.author)}</div>
              <div class="card-stats">
                <span>${views} visualizações</span>
                ${v.publishedText ? `<span>• ${v.publishedText}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function getBestThumb(v) {
      if (v.videoThumbnails && v.videoThumbnails.length) {
        const med = v.videoThumbnails.find(t => t.quality === 'medium' || t.quality === 'sddefault');
        return (med || v.videoThumbnails[0]).url;
      }
      return `https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg`;
    }

    // ===== PLAY VIDEO =====
    function playVideo(index) {
      const v = searchResults[index];
      if (!v) return;

      // Use YouTube embed (most reliable for playback)
      videoPlayer.src = `https://www.youtube-nocookie.com/embed/${v.videoId}?autoplay=1&rel=0`;
      playerTitle.textContent = v.title;
      playerChannel.textContent = v.author;
      playerViews.textContent = formatViews(v.viewCount) + ' visualizações';
      playerDate.textContent = v.publishedText || '';
      playerDesc.textContent = v.description || 'Sem descrição disponível.';

      playerSection.classList.add('active');
      playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closePlayer() {
      playerSection.classList.remove('active');
      videoPlayer.src = '';
    }

    function goHome() {
      closePlayer();
      searchInput.value = '';
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      document.querySelector('.pill').classList.add('active');
      sectionTitle.textContent = '🔥 Tendências';
      fetchVideos('Tendências Brasil');
    }

    // ===== UTILITIES =====
    function formatDuration(secs) {
      if (!secs || secs <= 0) return '';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
      return `${m}:${pad(s)}`;
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatViews(n) {
      if (!n) return '0';
      if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1).replace('.0', '') + 'B';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace('.0', '') + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace('.0', '') + 'K';
      return n.toLocaleString('pt-BR');
    }

    function escapeHtml(str) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String(str || '').replace(/[&<>"']/g, c => map[c]);
    }

    // ===== UI STATE HELPERS =====
    function showLoading(on) { loadingState.classList.toggle('active', on); if (on) hideResults(); }
    function showError(msg) { errorText.textContent = msg; errorState.classList.add('active'); hideResults(); }
    function hideError() { errorState.classList.remove('active'); }
    function showEmpty() { emptyState.style.display = 'block'; }
    function hideEmpty() { emptyState.style.display = 'none'; }
    function showResults() { resultsSection.style.display = 'block'; }
    function hideResults() { resultsSection.style.display = 'none'; }
  </script>

</body>
</html>
